<!DOCTYPE html>
<html>
<head>
    <title>DaRkb0x Remote</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            background: #0a0c12;
            color: #5ae6aa;
            font-family: monospace;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            user-select: none;
        }
        .screen-container {
            width: 100%;
            max-width: 600px;
            margin-top: 10px;
            border: 2px solid #282e3c;
            background: #000;
        }
        .screen-container img {
            width: 100%;
            display: block;
        }
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(3, 80px);
            grid-gap: 15px;
        }
        .btn {
            width: 70px;
            height: 70px;
            background: #121620;
            border: 2px solid #5ae6aa;
            color: #5ae6aa;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
            touch-action: manipulation;
        }
        .btn:active {
            background: #5ae6aa;
            color: #0a0c12;
        }
        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-gap: 5px;
        }
        .face-buttons {
            display: grid;
            grid-template-columns: repeat(2, 70px);
            grid-gap: 15px;
        }
        .system-buttons {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }
        .btn-rect {
            width: 100px;
            height: 40px;
            font-size: 14px;
        }
        .layout {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            padding: 20px;
        }
        h1 { font-size: 18px; margin: 10px 0; letter-spacing: 2px; }
    </style>
</head>
<body>
    <h1>DaRkb0x :: REMOTE_UI</h1>
    
    <div class="screen-container">
        <img src="/video_feed" id="screen">
    </div>

    <div class="layout">
        <!-- D-PAD -->
        <div class="dpad">
            <div></div><div class="btn" onmousedown="press('up')" ontouchstart="press('up')">UP</div><div></div>
            <div class="btn" onmousedown="press('left')" ontouchstart="press('left')">LFT</div>
            <div></div>
            <div class="btn" onmousedown="press('right')" ontouchstart="press('right')">RGT</div>
            <div></div><div class="btn" onmousedown="press('down')" ontouchstart="press('down')">DWN</div><div></div>
        </div>

        <!-- FACE BUTTONS -->
        <div class="face-buttons">
            <div class="btn" style="grid-column: 2" onmousedown="press('y')" ontouchstart="press('y')">Y</div>
            <div class="btn" onmousedown="press('x')" ontouchstart="press('x')">X</div>
            <div class="btn" onmousedown="press('b')" ontouchstart="press('b')">B</div>
            <div class="btn" style="grid-column: 2" onmousedown="press('a')" ontouchstart="press('a')">A</div>
        </div>
    </div>

    <div class="system-buttons">
        <div class="btn btn-rect" onmousedown="press('select')" ontouchstart="press('select')">SELECT</div>
        <div class="btn btn-rect" onmousedown="press('start')" ontouchstart="press('start')">START</div>
    </div>

    <div style="margin-top: 30px; padding: 20px; border: 1px dashed #5ae6aa; border-radius: 10px; width: 80%; max-width: 500px;">
        <h2 style="font-size: 14px; margin-bottom: 15px; text-align: center;">WARDRIVE :: WIGLE</h2>

        <div id="wigleSignedOut" style="display:none;">
            <div style="font-size:11px; color:#828ba0; margin-bottom:8px;">
                Sign in with your WiGLE <b>API Name</b> and <b>API Token</b>
                (mint at wigle.net/account &rarr; Show API Token).
            </div>
            <input type="text" id="apiName" placeholder="API Name (e.g. AID0000...)"
                   style="width:100%; box-sizing:border-box; margin-bottom:6px; padding:8px; background:#0a0c12; color:#5ae6aa; border:1px solid #282e3c; font-family:monospace;">
            <input type="password" id="apiToken" placeholder="API Token"
                   style="width:100%; box-sizing:border-box; margin-bottom:8px; padding:8px; background:#0a0c12; color:#5ae6aa; border:1px solid #282e3c; font-family:monospace;">
            <button onclick="wigleLogin()"
                    style="background:transparent; border:1px solid #5ae6aa; color:#5ae6aa; padding:8px 18px; cursor:pointer; font-family:monospace; width:100%;">
                SIGN IN
            </button>
            <div id="wigleLoginMsg" style="margin-top:8px; font-size:11px; color:#eb5a5a;"></div>
        </div>

        <div id="wigleSignedIn" style="display:none;">
            <div style="font-size:12px; color:#5ae6aa;">
                Signed in as <span id="wigleUser">?</span>
                <a href="#" onclick="wigleLogout(); return false;"
                   style="color:#828ba0; margin-left:8px;">[sign out]</a>
            </div>
            <div id="wardriveFiles" style="margin-top:14px; font-size:12px;"></div>
        </div>
    </div>

    <div style="margin-top: 20px; padding: 20px; border: 1px dashed #5ae6aa; border-radius: 10px; width: 80%; max-width: 500px; text-align: center;">
        <h2 style="font-size: 14px; margin-bottom: 15px;">UPLOAD MEDIA</h2>

        <div style="margin-bottom: 12px; font-size: 12px;">
            <label style="margin-right: 14px;">
                <input type="radio" name="folder" value="movies" checked> MOVIES
            </label>
            <label>
                <input type="radio" name="folder" value="tv"> TV
            </label>
        </div>

        <input type="file" id="fileInput" style="display: none;">
        <button onclick="document.getElementById('fileInput').click()" style="background: transparent; border: 1px solid #5ae6aa; color: #5ae6aa; padding: 10px 20px; cursor: pointer; font-family: monospace;">CHOOSE FILE</button>
        <div id="status" style="margin-top: 10px; font-size: 12px;"></div>

        <div id="library" style="margin-top: 18px; text-align: left; font-size: 11px;"></div>
    </div>

    <script>
        function press(btn) {
            fetch('/press/' + btn).catch(e => console.error(e));
        }

        function selectedFolder() {
            const r = document.querySelector('input[name="folder"]:checked');
            return r ? r.value : 'movies';
        }

        function refreshLibrary() {
            fetch('/media')
                .then(r => r.json())
                .then(data => {
                    const lib = document.getElementById('library');
                    let html = '';
                    for (const folder of ['movies', 'tv']) {
                        const items = data[folder] || [];
                        html += '<div style="margin-top:8px;">'
                             + '<div style="color:#5ae6aa;">[ ' + folder.toUpperCase()
                             + ' &mdash; ' + items.length + ' file(s) ]</div>';
                        if (items.length) {
                            html += '<ul style="margin:4px 0 0 14px; padding:0; color:#828ba0;">';
                            for (const f of items) {
                                html += '<li>' + f.replace(/[<>&]/g, '') + '</li>';
                            }
                            html += '</ul>';
                        }
                        html += '</div>';
                    }
                    lib.innerHTML = html;
                })
                .catch(() => {});
        }

        document.getElementById('fileInput').onchange = function() {
            const file = this.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append('file', file);
            formData.append('folder', selectedFolder());

            const status = document.getElementById('status');
            status.innerText = "UPLOADING: " + file.name + " -> " + selectedFolder() + "...";

            fetch('/upload', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'uploaded') {
                    status.innerText = "UPLOADED: " + data.filename + " (" + data.folder + ")";
                    refreshLibrary();
                } else {
                    status.innerText = "UPLOAD FAILED: " + (data.detail || 'unknown error');
                }
                setTimeout(() => { status.innerText = ""; }, 3000);
            })
            .catch(e => {
                status.innerText = "UPLOAD FAILED";
                console.error(e);
            });
            // reset so re-picking the same file fires onchange again
            this.value = '';
        };

        // Populate the library list on first paint.
        refreshLibrary();

        // ---------------- WiGLE / Wardrive ---------------------------------
        function fmtSize(n) {
            if (n < 1024) return n + 'B';
            if (n < 1024*1024) return (n/1024).toFixed(0) + 'KB';
            return (n/1024/1024).toFixed(1) + 'MB';
        }

        function refreshWigleStatus() {
            fetch('/wigle/status')
                .then(r => r.json())
                .then(data => {
                    if (data.logged_in) {
                        document.getElementById('wigleSignedIn').style.display = 'block';
                        document.getElementById('wigleSignedOut').style.display = 'none';
                        document.getElementById('wigleUser').innerText = data.api_name;
                        refreshWardriveFiles();
                    } else {
                        document.getElementById('wigleSignedIn').style.display = 'none';
                        document.getElementById('wigleSignedOut').style.display = 'block';
                    }
                })
                .catch(() => {});
        }

        function wigleLogin() {
            const name = document.getElementById('apiName').value.trim();
            const token = document.getElementById('apiToken').value.trim();
            const msg = document.getElementById('wigleLoginMsg');
            if (!name || !token) {
                msg.style.color = '#eb5a5a';
                msg.innerText = 'API Name and API Token required.';
                return;
            }
            const fd = new FormData();
            fd.append('api_name', name);
            fd.append('api_token', token);
            msg.style.color = '#828ba0';
            msg.innerText = 'verifying with wigle.net...';
            fetch('/wigle/login', {method: 'POST', body: fd})
                .then(r => r.json().then(j => ({ok: r.ok, body: j})))
                .then(({ok, body}) => {
                    if (ok) {
                        msg.style.color = '#5ae6aa';
                        msg.innerText = body.message || 'signed in';
                        document.getElementById('apiToken').value = '';
                        refreshWigleStatus();
                    } else {
                        msg.style.color = '#eb5a5a';
                        msg.innerText = body.detail || 'login failed';
                    }
                })
                .catch(e => {
                    msg.style.color = '#eb5a5a';
                    msg.innerText = 'request failed: ' + e;
                });
        }

        function wigleLogout() {
            fetch('/wigle/logout', {method: 'POST'})
                .then(() => refreshWigleStatus());
        }

        function refreshWardriveFiles() {
            fetch('/wardrive/files')
                .then(r => r.json())
                .then(data => {
                    const box = document.getElementById('wardriveFiles');
                    const items = data.files || [];
                    if (!items.length) {
                        box.innerHTML = '<div style="color:#828ba0;">No sessions yet — start one from Recon &rarr; Wardriving.</div>';
                        return;
                    }
                    let html = '<div style="color:#5ae6aa; margin-bottom:6px;">[ SESSIONS ]</div>';
                    for (const f of items) {
                        const safe = f.name.replace(/[<>&]/g, '');
                        html += '<div style="display:flex; justify-content:space-between; align-items:center; padding:4px 0; border-bottom:1px dotted #282e3c;">'
                              + '<span>' + safe + ' <span style="color:#828ba0;">(' + fmtSize(f.size) + ')</span></span>'
                              + '<button onclick="wigleUpload(\'' + encodeURIComponent(f.name) + '\', this)"'
                              + ' style="background:transparent; border:1px solid #5ae6aa; color:#5ae6aa; padding:4px 10px; cursor:pointer; font-family:monospace; font-size:11px;">UPLOAD</button>'
                              + '</div>';
                    }
                    box.innerHTML = html;
                })
                .catch(() => {});
        }

        function wigleUpload(name, btn) {
            btn.disabled = true;
            btn.innerText = 'UPLOADING...';
            fetch('/wardrive/upload/' + name, {method: 'POST'})
                .then(r => r.json().then(j => ({ok: r.ok, body: j})))
                .then(({ok, body}) => {
                    if (ok) {
                        btn.innerText = 'OK';
                        btn.style.color = '#5ae6aa';
                    } else {
                        btn.innerText = 'FAIL';
                        btn.style.color = '#eb5a5a';
                        btn.title = body.detail || 'upload failed';
                    }
                    setTimeout(() => { btn.innerText = 'UPLOAD'; btn.disabled = false; btn.style.color = '#5ae6aa'; }, 4000);
                })
                .catch(e => {
                    btn.innerText = 'ERR';
                    btn.disabled = false;
                });
        }

        refreshWigleStatus();
        setInterval(refreshWardriveFiles, 30000);
        
        // Prevent zoom on double tap for iOS
        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
